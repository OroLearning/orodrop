    <style>
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ebebeb;
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.22) 1.43px, transparent 1.63px);
            background-size: 36px 36px;
            background-attachment: fixed;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        body.dark {
            background-color: #121212;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.3) 1.43px, transparent 1.63px);
            color: #fcfdfe;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.015; pointer-events: none; z-index: 9999;
        }

        .convex-title {
            perspective: 1000px;
            display: inline-block;
            transform-style: preserve-3d;
            transform: rotateX(12deg) scale(1.05);
            text-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @keyframes wiggle-premium {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-0.8deg); }
            75% { transform: rotate(0.8deg); }
        }
        .wiggle-on-hover:hover {
            animation: wiggle-premium 0.4s ease-in-out infinite;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .shadow-heavy {
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.18), 0 20px 40px -15px rgba(0, 0, 0, 0.12);
        }

        /* Rain Loading Animation */
        @keyframes rain-fall {
            0% { transform: translateY(-10px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(10px); opacity: 0; }
        }
        .rain-drop {
            animation: rain-fall 0.8s linear infinite;
            animation-play-state: running !important;
        }
        .rain-drop:nth-child(2) { animation-delay: 0.2s; }
        .rain-drop:nth-child(3) { animation-delay: 0.4s; }

        /* Dotted Border Animation */
        @keyframes rotate-dots {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 100; }
        }
        .animate-dots-rotate {
            animation: rotate-dots 5s linear infinite;
            animation-play-state: running !important;
        }

        /* Custom Scrollbar for Dashboard */
        .custom-scrollbar::-webkit-scrollbar {
          width: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: rgba(0,0,0,0.03);
          border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-track {
          background: rgba(255,255,255,0.03);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: #a1a1aa;
          border-radius: 10px;
          border: 2px solid transparent;
          background-clip: content-box;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: #71717a;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {

          border: 2px solid transparent;

        }
